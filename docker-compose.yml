services:

  jpos-cms-db:
    image: postgres:15.3
    container_name: jpos-cms-db
    environment:
      POSTGRES_USER: cms_user
      POSTGRES_PASSWORD: cms_pass
      POSTGRES_DB: jpos-cms-auth
    volumes:
      - jpos-cms-db-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - jpos-cms-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cms_user -d jpos-cms-auth"]
      interval: 10s
      timeout: 5s
      retries: 5

  jpos-cms-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: jpos-cms-backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://cms_user:cms_pass@jpos-cms-db:5432/jpos-cms-auth
    volumes:
      - ./backend:/app
    ports:
      - "8002:8000"
    depends_on:
      jpos-cms-db:
        condition: service_healthy
    networks:
      - jpos-cms-net
  
  jpos-cms-frontend:
    image: node:18-alpine
    container_name: jpos-cms-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    depends_on:
      jpos-cms-backend:
        condition: service_started
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3001:3000"
      - "5174:5173"
    networks:
      - jpos-cms-net

volumes:
  jpos-cms-db-data:

networks:
  jpos-cms-net:
    driver: bridge