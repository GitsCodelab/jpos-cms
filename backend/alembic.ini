# Alembic Configuration File
# Generated manually without pip

[alembic]
# Path to migration scripts
sqlalchemy.url = postgresql://postgres:postgres@localhost:5432/jpos_cms
script_location = alembic
sqlalchemy.echo = False
sqlalchemy.echo_pool = False
sqlalchemy.pool_size = 10
sqlalchemy.pool_recycle = 3600
sqlalchemy.pool_pre_ping = true

[loggers]
keys = root,sqlalchemy

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
